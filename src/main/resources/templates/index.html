<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Центр</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <style>
        .money-card { transition: all 0.3s ease; }
        .money-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div id="auth-prompt" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-96">
        <h3 class="text-2xl font-bold mb-6 text-center">Вход</h3>
        <form id="login-form" class="space-y-4">
            <input type="text" id="auth-login" placeholder="Логин" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-blue-500" required>
            <input type="password" id="auth-password" placeholder="Пароль" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-blue-500" required>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">Войти</button>
        </form>
    </div>
</div>

<div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-white border-r flex flex-col">
        <div class="p-6 border-b flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-100">
                <i data-feather="trending-up" class="text-white w-6 h-6"></i>
            </div>
            <span class="text-xl font-bold">FinCenter</span>
        </div>
        <nav class="flex-1 p-4">
            <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-semibold">
                <i data-feather="grid" class="w-5 h-5"></i>
                <span>Главная</span>
            </a>
        </nav>
        <div class="p-6 border-t">
            <p id="user-display-name" class="font-bold text-sm truncate text-gray-800">Гость</p>
            <button onclick="logout()" class="text-xs text-red-500 hover:underline">Выйти</button>
        </div>
    </aside>

    <main class="flex-1 overflow-auto">
        <header class="bg-white/80 backdrop-blur-md border-b py-6 px-8 sticky top-0 z-10 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">Обзор финансов</h1>
            <button onclick="loadDashboardData()" class="p-2 bg-gray-50 rounded-xl text-gray-500 hover:text-blue-600">
                <i data-feather="refresh-cw" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="money-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Баланс</p>
                    <p id="data-totalBalance" class="text-3xl font-black mt-1">0 ₽</p>
                </div>
                <div class="money-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest text-green-500">Доходы</p>
                    <p id="data-totalIncomes" class="text-3xl font-black mt-1 text-green-600">0 ₽</p>
                </div>
                <div class="money-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest text-red-500">Расходы</p>
                    <p id="data-totalExpenses" class="text-3xl font-black mt-1 text-red-600">0 ₽</p>
                </div>
                <div class="money-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Сбережения</p>
                        <span id="target-percent" class="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-bold hidden">0%</span>
                    </div>
                    <p id="data-saving" class="text-3xl font-black mt-1">0 ₽</p>
                    <div id="target-section" class="mt-4 pt-4 border-t border-gray-50 hidden">
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Цель</p>
                        <p id="data-savingTarget" class="text-sm font-bold text-purple-600">0 ₽</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="mb-6">
                        <h3 class="text-xl font-bold text-gray-800">Динамика потоков</h3>
                        <p class="text-sm text-gray-400">Накопленные доходы и расходы за месяц</p>
                    </div>
                    <div class="h-[350px]">
                        <canvas id="cashFlowChart"></canvas>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm">
                    <div class="mb-6">
                        <h3 class="text-xl font-bold text-gray-800">Распределение финансов</h3>
                        <p class="text-sm text-gray-400">Распределение по категориям</p>
                    </div>
                    <div class="h-[350px] relative">
                        <canvas id="walletPieChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/js/utils.js"></script>
<script src="/js/charts.js"></script>
<script src="/js/app.js"></script>
<script>
    // Инициализация иконок после загрузки
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof feather !== 'undefined') {
            feather.replace();
        }
    });
</script>
</body>
</html>
